# nginx.conf
#
# Serves the Vue SPA and proxies backend traffic.
# Also sets COOP/COEP headers so getUserMedia() works over plain HTTP on LAN.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers — required for WebRTC getUserMedia over HTTP ────────
    # COOP + COEP together create a "cross-origin isolated" secure context,
    # which lets the browser grant camera/mic access without needing HTTPS.
    add_header Cross-Origin-Opener-Policy   "same-origin"   always;
    add_header Cross-Origin-Embedder-Policy "require-corp"  always;
    add_header Cross-Origin-Resource-Policy "cross-origin"  always;

    # ── Socket.IO proxy ──────────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         https://chat-backend-o4dm.onrender.com;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── REST API proxy ───────────────────────────────────────────────────────
    location /api/ {
        proxy_pass       https://chat-backend-o4dm.onrender.com;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Vue SPA — catch-all ──────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets aggressively
    location ~* \.(js|css|woff2?|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        try_files $uri =404;
    }
}
